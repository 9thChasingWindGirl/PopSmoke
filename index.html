<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>PopSmoke Tracker</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@700;900&family=Noto+Sans+KR:wght@700;900&family=Noto+Sans+SC:wght@700;900&family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              // 'Bangers' for English/Numbers, Noto Sans [Lang] Black (900) for others to match Pop style
              display: ['Bangers', '"Noto Sans SC"', '"Noto Sans JP"', '"Noto Sans KR"', 'cursive'],
              body: ['"HarmonyOS Sans"', '"HarmonyOS Sans SC"', '"Noto Sans SC"', '"Noto Sans JP"', '"Noto Sans KR"', 'sans-serif'],
            },
            colors: {
              paper: '#fdfbf7',
            },
            boxShadow: {
              'pop': '4px 4px 0px 0px rgba(0,0,0,1)',
              'pop-hover': '2px 2px 0px 0px rgba(0,0,0,1)',
              'pop-lg': '8px 8px 0px 0px rgba(0,0,0,1)',
            },
            animation: {
              'slide-in': 'slideIn 0.3s ease-out forwards',
              'pop-blast': 'popBlast 0.6s ease-out forwards',
              'slide-down': 'slideDown 0.4s ease-out forwards',
              'slide-up': 'slideUp 0.3s ease-in forwards',
              'shake': 'shake 0.5s ease-in-out',
            },
            keyframes: {
              slideIn: {
                '0%': { opacity: '0', transform: 'translateY(10px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              popBlast: {
                '0%': { opacity: '0', transform: 'translate(-50%, -50%) scale(0.5) rotate(-15deg)' },
                '50%': { opacity: '1', transform: 'translate(-50%, -50%) scale(1.2) rotate(15deg)' },
                '100%': { opacity: '0', transform: 'translate(-50%, -50%) scale(1.5) rotate(0deg)' },
              },
              slideDown: {
                '0%': { opacity: '0', transform: 'translateY(-100%)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUp: {
                '0%': { opacity: '1', transform: 'translateY(0)' },
                '100%': { opacity: '0', transform: 'translateY(-100%)' },
              },
              shake: {
                '0%, 100%': { transform: 'translateX(0)' },
                '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-5px)' },
                '20%, 40%, 60%, 80%': { transform: 'translateX(5px)' },
              }
            }
          }
        },
        plugins: [
            function({ addUtilities }) {
                addUtilities({
                    '.transform-style-3d': {
                        'transform-style': 'preserve-3d',
                    },
                    '.backface-hidden': {
                        'backface-visibility': 'hidden',
                    },
                })
            }
        ]
      }
    </script>
    <style>
      @font-face {
        font-family: 'HarmonyOS Sans';
        src: url('/fonts/HarmonyOS_Sans_Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'HarmonyOS Sans';
        src: url('/fonts/HarmonyOS_Sans_Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'HarmonyOS Sans';
        src: url('/fonts/HarmonyOS_Sans_Black.ttf') format('truetype');
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'HarmonyOS Sans SC';
        src: url('/fonts/HarmonyOS_Sans_SC_Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'HarmonyOS Sans SC';
        src: url('/fonts/HarmonyOS_Sans_SC_Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'HarmonyOS Sans SC';
        src: url('/fonts/HarmonyOS_Sans_SC_Black.ttf') format('truetype');
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }
      
      body {
        background-color: #f0f0f0;
        background-image: radial-gradient(#000 1px, transparent 1px);
        background-size: 20px 20px;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none; /* Prevent bounce */
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        /* 全局响应式优化 */
        min-height: 100vh;
        overflow-x: hidden;
      }
      
      /* 响应式字体大小 */
      @media (max-width: 640px) {
        html {
          font-size: 14px;
        }
      }
      @media (min-width: 641px) and (max-width: 768px) {
        html {
          font-size: 15px;
        }
      }
      @media (min-width: 769px) and (max-width: 1200px) {
        html {
          font-size: 16px;
        }
      }
      @media (min-width: 1201px) {
        html {
          font-size: 16px;
        }
      }
      
      /* 消除滚动冲突 */
      .no-scroll {
        overflow: hidden;
      }
      .scroll-y-only {
        overflow-y: auto;
        overflow-x: hidden;
      }
      .scroll-x-only {
        overflow-x: auto;
        overflow-y: hidden;
      }
      
      /* 响应式容器 */
      .responsive-container {
        width: 100%;
        padding-left: 1rem;
        padding-right: 1rem;
        margin-left: auto;
        margin-right: auto;
      }
      @media (min-width: 640px) {
        .responsive-container {
          padding-left: 1rem;
          padding-right: 1rem;
        }
      }
      @media (min-width: 768px) {
        .responsive-container {
          padding-left: 1.5rem;
          padding-right: 1.5rem;
          max-width: 728px;
        }
      }
      @media (min-width: 1200px) {
        .responsive-container {
          padding-left: 2rem;
          padding-right: 2rem;
          max-width: 1200px;
        }
      }
      
      /* 允许输入框选中和复制 */
      input, textarea {
        user-select: text;
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
      }
      /* Ensure range inputs look Pop-ish */
      input[type=range] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        background: transparent;
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 24px;
        width: 24px;
        border: 2px solid black;
        border-radius: 50%;
        background: #ffffff;
        cursor: pointer;
        margin-top: -10px;
        box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
      }
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: #000000;
      }

      /* CUSTOM SCROLLBAR UTILITIES */
      
      /* Hidden Scrollbar (for TimePicker wheel effect) */
      .scrollbar-hide {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }

      /* Pop Art Scrollbar (High Contrast) */
      .scrollbar-pop {
          scrollbar-width: thin;
          scrollbar-color: #000 #fff;
      }
      .scrollbar-pop::-webkit-scrollbar {
          width: 12px;
          height: 12px;
      }
      .scrollbar-pop::-webkit-scrollbar-track {
          background: #ffffff;
          border-left: 2px solid #000000;
      }
      .scrollbar-pop::-webkit-scrollbar-thumb {
          background-color: #000000;
          border: 2px solid #ffffff;
      }
      .scrollbar-pop::-webkit-scrollbar-thumb:hover {
          background-color: #333333;
      }

      /* Terminal Scrollbar (Dark theme for operation logs) */
      .scrollbar-terminal {
          scrollbar-width: thin;
          scrollbar-color: #4ade80 #1f2937;
      }
      .scrollbar-terminal::-webkit-scrollbar {
          width: 8px;
          height: 8px;
      }
      .scrollbar-terminal::-webkit-scrollbar-track {
          background: #1f2937;
      }
      .scrollbar-terminal::-webkit-scrollbar-thumb {
          background-color: #4ade80;
          border-radius: 0;
      }
      .scrollbar-terminal::-webkit-scrollbar-thumb:hover {
          background-color: #22c55e;
      }
      
      /* 响应式图标 */
      .icon-responsive {
        width: 1.5rem;
        height: 1.5rem;
      }
      @media (min-width: 768px) {
        .icon-responsive {
          width: 2rem;
          height: 2rem;
        }
      }
      
      /* 响应式文字 */
      .text-responsive-h1 {
        font-size: 1.5rem;
        line-height: 1.2;
      }
      @media (min-width: 640px) {
        .text-responsive-h1 {
          font-size: 1.875rem;
        }
      }
      @media (min-width: 768px) {
        .text-responsive-h1 {
          font-size: 2.25rem;
        }
      }
      @media (min-width: 1200px) {
        .text-responsive-h1 {
          font-size: 3rem;
        }
      }
      
      .text-responsive-h2 {
        font-size: 1.25rem;
        line-height: 1.3;
      }
      @media (min-width: 640px) {
        .text-responsive-h2 {
          font-size: 1.5rem;
        }
      }
      @media (min-width: 768px) {
        .text-responsive-h2 {
          font-size: 1.875rem;
        }
      }
      @media (min-width: 1200px) {
        .text-responsive-h2 {
          font-size: 2.25rem;
        }
      }
      
      .text-responsive-h3 {
        font-size: 1rem;
        line-height: 1.4;
      }
      @media (min-width: 640px) {
        .text-responsive-h3 {
          font-size: 1.125rem;
        }
      }
      @media (min-width: 768px) {
        .text-responsive-h3 {
          font-size: 1.25rem;
        }
      }
      @media (min-width: 1200px) {
        .text-responsive-h3 {
          font-size: 1.5rem;
        }
      }
      
      .text-responsive-body {
        font-size: 0.875rem;
        line-height: 1.5;
      }
      @media (min-width: 768px) {
        .text-responsive-body {
          font-size: 1rem;
        }
      }
      
      .text-responsive-small {
        font-size: 0.75rem;
        line-height: 1.5;
      }
      @media (min-width: 768px) {
        .text-responsive-small {
          font-size: 0.875rem;
        }
      }
    </style>

</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
