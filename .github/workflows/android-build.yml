name: PopSmoke Android 构建

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建 Release'
        required: false
        default: 'true'
        type: boolean
      channel:
        description: '发布通道'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - stable

env:
  APP_NAME: 'PopSmoke'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.build_info.outputs.version_code }}
      build_number: ${{ steps.build_info.outputs.build_number }}

    steps:
      - uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build
      - run: pnpm exec cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: 获取构建信息
        id: build_info
        run: |
          echo "version_code=$(date +%s)" >> $GITHUB_OUTPUT
          echo "build_number=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: 注入版本号
        run: |
          echo "VERSION_CODE=${{ steps.build_info.outputs.version_code }}" >> android/gradle.properties
          echo "VERSION_NAME=${{ steps.version.outputs.version }}" >> android/gradle.properties

      - name: 构建 APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 复制 APK
        run: |
          mkdir -p android/app/build/outputs/apk/final
          cp android/app/build/outputs/apk/debug/*.apk android/app/build/outputs/apk/final/

      - uses: actions/upload-artifact@v4
        with:
          name: PopSmoke-APK
          path: android/app/build/outputs/apk/final/*.apk

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.create_release == true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: PopSmoke-APK
          path: ./apk

      # ✅ 设置 channel
      - name: 设置发布通道
        id: channel
        run: |
          echo "channel=${{ inputs.channel }}" >> $GITHUB_OUTPUT
          if [ "${{ inputs.channel }}" = "beta" ]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      # ✅ 当前 tag
      - name: 生成 tag
        id: tag
        run: |
          TAG="v${{ needs.build.outputs.version }}-${{ steps.channel.outputs.channel }}.${{ needs.build.outputs.build_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # ✅ 找到上一个 release（同 channel）
      - name: 获取上一个 Release
        id: last_release
        run: |
          LAST=$(gh release list --limit 50 \
            | grep "v${{ needs.build.outputs.version }}-${{ steps.channel.outputs.channel }}" \
            | head -1 \
            | awk '{print $1}')

          echo "last=$LAST" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ 获取 commit 变更（核心）
      - name: 生成版本更迭变化
        id: changelog
        run: |
          if [ -z "${{ steps.last_release.outputs.last }}" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)")
          else
            LOG=$(git log ${{ steps.last_release.outputs.last }}..HEAD --pretty=format:"- %s (%h)")
          fi

          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # ✅ 获取旧 release body（用于合并）
      - name: 获取旧版本变更历史
        id: old_body
        run: |
          BODY=""
          for tag in $(gh release list --limit 50 | grep "v${{ needs.build.outputs.version }}-${{ steps.channel.outputs.channel }}" | awk '{print $1}'); do
            OLD=$(gh release view "$tag" --json body -q .body)
            BODY="$BODY\n\n$OLD"
          done

          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ 删除旧 release（同版本）
      - name: 删除旧 Release
        run: |
          gh release list --limit 50 | while read tag rest; do
            if [[ "$tag" == v${{ needs.build.outputs.version }}-${{ steps.channel.outputs.channel }}* ]]; then
              gh release delete "$tag" -y
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ 合并最终 body
      - name: 合并 Release 内容
        id: final
        run: |
          FINAL="## 🚀 版本更迭变化

${{ steps.changelog.outputs.log }}

---

${{ steps.old_body.outputs.body }}

## 📦 构建信息

版本: v${{ needs.build.outputs.version }}
构建号: ${{ needs.build.outputs.build_number }}
通道: ${{ steps.channel.outputs.channel }}
"

          {
            echo "body<<EOF"
            echo "$FINAL"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # ✅ 创建 Release
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ env.APP_NAME }} ${{ steps.tag.outputs.tag }}
          body: ${{ steps.final.outputs.body }}
          files: ./apk/*.apk
          prerelease: ${{ steps.channel.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}