name: PopSmoke Android 构建

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建 Release'
        required: false
        default: 'true'
        type: boolean
      channel:
        description: '发布通道'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - stable

env:
  APP_NAME: 'PopSmoke'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.build_info.outputs.version_code }}
      build_number: ${{ steps.build_info.outputs.build_number }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 设置发布通道
        id: channel
        run: |
          CHANNEL="${{ inputs.channel }}"
          if [ "$CHANNEL" = "beta" ]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build
      - run: pnpm exec cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: 获取构建信息
        id: build_info
        run: |
          echo "version_code=$(date +%s)" >> $GITHUB_OUTPUT
          echo "build_number=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      # ✅ 合并构建（性能优化）
      - name: 构建全部产物
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease bundleRelease \
            -PVERSION_CODE=${{ steps.build_info.outputs.version_code }} \
            -PVERSION_NAME=${{ steps.version.outputs.version }}

      - name: 整理产物
        run: |
          mkdir -p output
          find android -name "*.apk" -exec cp {} output/ \;
          find android -name "*.aab" -exec cp {} output/ \;

      - name: 上传 Artifact（唯一命名）
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: output/*
          retention-days: 1

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.create_release == true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载 Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: ./artifacts

      # ✅ 精确匹配旧 Release（修复误删）
      - name: 处理旧 Release
        id: old_release
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          CHANNEL="${{ inputs.channel }}"

          OLD_TAG=$(gh release list --limit 100 --json tagName \
            --jq ".[] | select(.tagName | startswith(\"v${VERSION}-${CHANNEL}.\")) | .tagName" \
            | head -1)

          if [ -n "$OLD_TAG" ]; then
            echo "发现旧 Release: $OLD_TAG"

            BODY=$(gh release view $OLD_TAG --json body -q .body)

            echo "old_body<<EOF" >> $GITHUB_OUTPUT
            echo "$BODY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            gh release delete $OLD_TAG -y
            git push origin :refs/tags/$OLD_TAG
          else
            echo "无旧 Release"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ 获取“同通道”上一个 tag（关键修复）
      - name: 获取上一个 Tag
        id: prev_tag
        run: |
          CHANNEL="${{ inputs.channel }}"
          TAG=$(git tag --list "v*-${CHANNEL}.*" --sort=-v:refname | head -1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # ✅ 生成干净 changelog
      - name: 生成版本更迭变化
        id: changelog
        run: |
          if [ -z "${{ steps.prev_tag.outputs.tag }}" ]; then
            RANGE=""
          else
            RANGE="${{ steps.prev_tag.outputs.tag }}..HEAD"
          fi

          LOG=$(git log $RANGE --pretty=format:"%s" --no-merges)

          FEAT=$(echo "$LOG" | grep "^feat" || true)
          FIX=$(echo "$LOG" | grep "^fix" || true)
          OTHER=$(echo "$LOG" | grep -vE "^(feat|fix)" || true)

          [ -z "$FEAT" ] && FEAT="无"
          [ -z "$FIX" ] && FIX="无"
          [ -z "$OTHER" ] && OTHER="无"

          {
            echo "log<<EOF"
            echo "### ✨ 新功能"
            echo "$FEAT"
            echo ""
            echo "### 🐛 修复"
            echo "$FIX"
            echo ""
            echo "### 🧩 其他"
            echo "$OTHER"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}-${{ inputs.channel }}.${{ needs.build.outputs.build_number }}
          name: ${{ env.APP_NAME }} v${{ needs.build.outputs.version }} (${{ inputs.channel }})
          prerelease: ${{ inputs.channel == 'beta' }}
          body: |
            ## 📦 构建信息
            - 版本: v${{ needs.build.outputs.version }}
            - 通道: ${{ inputs.channel }}
            - 构建号: ${{ needs.build.outputs.build_number }}

            ## 🔄 版本更迭变化
            ${{ steps.changelog.outputs.log }}

            ## 📜 历史合并
            ${{ steps.old_release.outputs.old_body }}

          files: ./artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ 只清理当前 run 的 Artifact
      - name: 清理当前构建 Artifact
        if: always()
        run: |
          echo "清理当前 run 的 artifacts..."

          RUN_ID=${{ github.run_id }}

          IDS=$(gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[].id')

          if [ -z "$IDS" ]; then
            echo "没有需要清理的 artifact"
            exit 0
          fi

          for id in $IDS; do
            echo "删除 artifact: $id"
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
          done

          echo "清理完成"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}