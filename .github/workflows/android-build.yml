name: PopSmoke Android 构建

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建 Release'
        required: false
        default: 'true'
        type: boolean

env:
  APP_NAME: 'PopSmoke'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.build_info.outputs.version_code }}
      build_number: ${{ steps.build_info.outputs.build_number }}

    steps:
      - uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install

      - name: 构建 Web 应用
        run: pnpm build

      - name: 同步 Capacitor
        run: pnpm exec cap sync android

      - name: 设置 Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: 获取构建信息
        id: build_info
        run: |
          VERSION_CODE=$(date +%s)
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "版本代码: $VERSION_CODE"
          echo "构建编号: $BUILD_NUMBER"

      - name: 构建 APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 检查并复制 APK
        run: |
          # 查找所有 APK 文件
          APK_FILES=$(find android/app/build -type f -name "*.apk")
          
          if [ -z "$APK_FILES" ]; then
            echo "错误：未找到任何 APK 文件！"
            exit 1
          fi
          
          echo "找到以下 APK 文件："
          echo "$APK_FILES"
          
          # 创建输出目录
          mkdir -p android/app/build/outputs/apk/final
          
          # 提取架构名称的函数
          get_arch_name() {
            local filename="$1"
            if echo "$filename" | grep -qi "universal"; then
              echo "universal"
            elif echo "$filename" | grep -qi "arm64-v8a"; then
              echo "arm64-v8a"
            elif echo "$filename" | grep -qi "armeabi-v7a"; then
              echo "armeabi-v7a"
            elif echo "$filename" | grep -qi "x86_64"; then
              echo "x86_64"
            elif echo "$filename" | grep -qi "x86"; then
              echo "x86"
            else
              echo ""
            fi
          }
          
          # 复制所有 APK 到最终目录并重命名（带架构信息）
          for APK in $APK_FILES; do
            BASENAME=$(basename "$APK")
            EXT="${BASENAME##*.}"
            ARCH=$(get_arch_name "$BASENAME")
            
            if [ -n "$ARCH" ]; then
              NEW_NAME="${{ env.APP_NAME }}-v${{ steps.version.outputs.version }}-${{ steps.build_info.outputs.build_number }}-${ARCH}.${EXT}"
            else
              NEW_NAME="${{ env.APP_NAME }}-v${{ steps.version.outputs.version }}-${{ steps.build_info.outputs.build_number }}.${EXT}"
            fi
            
            cp "$APK" "android/app/build/outputs/apk/final/$NEW_NAME"
            echo "已复制: $BASENAME -> $NEW_NAME"
          done
          
          # 也复制 universal APK（如果存在）作为主 APK
          UNIVERSAL_APK=$(echo "$APK_FILES" | grep -i "universal" | head -1)
          if [ -n "$UNIVERSAL_APK" ]; then
            cp "$UNIVERSAL_APK" "android/app/build/outputs/apk/final/${{ env.APP_NAME }}-v${{ steps.version.outputs.version }}-${{ steps.build_info.outputs.build_number }}.apk"
            echo "已复制 universal APK 作为主 APK"
          else
            # 如果没有 universal APK，使用第一个找到的
            FIRST_APK=$(echo "$APK_FILES" | head -1)
            cp "$FIRST_APK" "android/app/build/outputs/apk/final/${{ env.APP_NAME }}-v${{ steps.version.outputs.version }}-${{ steps.build_info.outputs.build_number }}.apk"
            echo "已复制第一个 APK 作为主 APK"
          fi

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: PopSmoke-APK
          path: android/app/build/outputs/apk/final/*.apk
          retention-days: 7

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.create_release == true
    
    steps:
      - uses: actions/checkout@v4

      - name: 下载 APK
        uses: actions/download-artifact@v4
        with:
          name: PopSmoke-APK
          path: ./apk

      - name: 获取提交历史
        id: commits
        run: |
          COMMITS=$(git log --pretty=format:"- %s (%h)" -10 | head -10)
          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}-${{ needs.build.outputs.build_number }}
          name: ${{ env.APP_NAME }} v${{ needs.build.outputs.version }}
          body: |
            ## 📦 构建信息
            
            | 项目 | 内容 |
            |------|------|
            | **版本** | v${{ needs.build.outputs.version }} |
            | **版本代码** | ${{ needs.build.outputs.version_code }} |
            | **构建编号** | ${{ needs.build.outputs.build_number }} |
            | **构建时间** | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |
            | **构建分支** | ${{ github.ref_name }} |
            | **触发方式** | ${{ github.event_name }} |
            | **触发者** | ${{ github.actor }} |
            
            ## 📱 下载
            
            下载 APK 文件：`PopSmoke-v${{ needs.build.outputs.version }}-${{ needs.build.outputs.build_number }}.apk`
            
            ## 📝 最近提交记录
            
            ${{ steps.commits.outputs.commits }}
            
            ## 🔧 技术栈
            
            - React 19 + TypeScript
            - Vite 6
            - Tailwind CSS 4
            - Capacitor 8
            - Supabase
            
            ---            
            
            **完整更新日志**: https://github.com/${{ github.repository }}/compare/v${{ needs.build.outputs.version }}...v${{ needs.build.outputs.version }}-${{ needs.build.outputs.build_number }}
          files: ./apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}