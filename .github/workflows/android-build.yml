name: PopSmoke Android 构建

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建 Release'
        required: false
        default: 'true'
        type: boolean
      channel:
        description: '发布通道'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - stable

env:
  APP_NAME: 'PopSmoke tracker'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.build_info.outputs.version_code }}
      build_number: ${{ steps.build_info.outputs.build_number }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 设置发布通道
        id: channel
        run: |
          CHANNEL="${{ inputs.channel }}"
          if [ "$CHANNEL" = "beta" ]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build
      - run: pnpm exec cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: 获取构建信息
        id: build_info
        run: |
          echo "version_code=$(date +%s)" >> $GITHUB_OUTPUT
          echo "build_number=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      # 构建 APK（多架构）
      - name: 构建 APK
        run: |
          cd android
          chmod +x gradlew

          if [ "${{ inputs.channel }}" = "beta" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi

      # 收集多架构 APK
      - name: 整理产物
        run: |
          mkdir -p output

          VERSION=${{ steps.version.outputs.version }}
          CHANNEL=${{ inputs.channel }}
          BUILD_NUMBER=${{ steps.build_info.outputs.build_number }}

          if [ "$CHANNEL" = "beta" ]; then
            APK_DIR="android/app/build/outputs/apk/debug"
          else
            APK_DIR="android/app/build/outputs/apk/release"
          fi

          # 遍历各 ABI
          for APK in $(find $APK_DIR -name "*.apk" -type f); do
            BASENAME=$(basename $APK)
            ABI=$(echo $BASENAME | sed -E 's/.*-(arm64-v8a|armeabi-v7a|x86|x86_64).*\.apk/\1/')
            [ -z "$ABI" ] && ABI="universal"
            TARGET="PopSmoke-tracker-v${VERSION}-${CHANNEL}-${ABI}.apk"
            cp "$APK" "output/$TARGET"
          done

      - name: 上传 Artifact（唯一命名）
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: output/*
          retention-days: 1

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载 Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: ./artifacts

      - name: 处理旧 Release
        id: old_release
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          CHANNEL="${{ inputs.channel }}"

          OLD_TAG=$(gh release list --limit 100 --json tagName \
            --jq ".[] | select(.tagName | startswith(\"v${VERSION}-${CHANNEL}.\")) | .tagName" \
            | head -1)

          if [ -n "$OLD_TAG" ]; then
            OLD_LOG=$(gh release view $OLD_TAG --json body -q '.body' | sed -n '/## 🔄 版本更迭变化/,/##/p' | sed '$d')
            echo "old_log<<EOF" >> $GITHUB_OUTPUT
            echo "$OLD_LOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            gh release delete $OLD_TAG -y
            git push origin :refs/tags/$OLD_TAG
          else
            echo "old_log<<EOF" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: 获取上一个 Tag
        id: prev_tag
        run: |
          CHANNEL="${{ inputs.channel }}"
          TAG=$(git tag --list "v*-${CHANNEL}.*" --sort=-v:refname | head -1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 生成 changelog
        id: changelog
        run: |
          if [ -z "${{ steps.prev_tag.outputs.tag }}" ]; then
            RANGE=""
          else
            RANGE="${{ steps.prev_tag.outputs.tag }}..HEAD"
          fi

          LOG=$(git log $RANGE --pretty=format:"%s" --no-merges)
          FEAT=$(echo "$LOG" | grep "^feat" || true)
          FIX=$(echo "$LOG" | grep "^fix" || true)
          OTHER=$(echo "$LOG" | grep -vE "^(feat|fix)" || true)

          [ -z "$FEAT" ] && FEAT="无"
          [ -z "$FIX" ] && FIX="无"
          [ -z "$OTHER" ] && OTHER="无"

          NEW_LOG=$(printf "### ✨ 新功能\n%s\n\n### 🐛 修复\n%s\n\n### 🧩 其他\n%s\n" "$FEAT" "$FIX" "$OTHER")

          # 合并旧 release 的版本更迭变化，移除可能的重复标题
          OLD_LOG=$(echo "${{ steps.old_release.outputs.old_log }}" | sed '/^## 🔄 版本更迭变化/d')
          MERGED_LOG="$OLD_LOG"$'\n'"$NEW_LOG"

          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$MERGED_LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
            tag_name: v${{ needs.build.outputs.version }}-${{ inputs.channel }}.${{ needs.build.outputs.build_number }}
            name: ${{ env.APP_NAME }} v${{ needs.build.outputs.version }} (${{ inputs.channel }})
            prerelease: ${{ inputs.channel == 'beta' }}
            body: |
                ## 📦 构建信息
                - 应用: ${{ env.APP_NAME }}
                - 版本: v${{ needs.build.outputs.version }}
                - 通道: ${{ inputs.channel }}
                - 构建号: ${{ needs.build.outputs.build_number }}

                ## 📱 产物说明
                - beta：Debug 构建（用于测试，未优化，体积较大）
                - stable：Release 构建（性能优化版本，适合正式使用）

                ## 🔄 版本更迭变化
                ${{ steps.changelog.outputs.log }}
            # 使用 files 参数指定要上传的文件
            files: ./artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: 清理当前构建 Artifact
        if: always()
        run: |
          RUN_ID=${{ github.run_id }}

          IDS=$(gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[].id')

          for id in $IDS; do
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
          done
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}